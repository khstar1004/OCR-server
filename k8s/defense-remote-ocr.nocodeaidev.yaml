apiVersion: apps/v1
kind: Deployment
metadata:
  name: a-cong-vllm-ocr
  namespace: nocodeaidev
  labels:
    app.kubernetes.io/name: a-cong-ocr
    app.kubernetes.io/component: vllm-ocr
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: a-cong-ocr
      app.kubernetes.io/component: vllm-ocr
  template:
    metadata:
      labels:
        app.kubernetes.io/name: a-cong-ocr
        app.kubernetes.io/component: vllm-ocr
      annotations:
        hami.io/node-scheduler-policy: binpack
        hami.io/gpu-scheduler-policy: spread
        nvidia.com/vgpu-mode: hami-core
    spec:
      schedulerName: hami-scheduler
      imagePullSecrets:
        - name: harbor-reg-cred
      containers:
        - name: vllm-ocr
          image: nocodeaidev.army.mil:20443/nocodeaidev/a-cong-vllm-openai:chandra
          imagePullPolicy: IfNotPresent
          args:
            - "$(VLLM_MODEL_PATH)"
            - --trust-remote-code
            - --served-model-name
            - "$(VLLM_MODEL_NAME)"
            - --dtype
            - bfloat16
            - --host
            - 0.0.0.0
            - --port
            - "5000"
            - --max-model-len
            - "$(VLLM_MAX_MODEL_LEN)"
            - --gpu-memory-utilization
            - "$(VLLM_GPU_MEMORY_UTILIZATION)"
            - --mm-processor-kwargs
            - "$(VLLM_MM_PROCESSOR_KWARGS)"
            - --distributed-executor-backend
            - uni
            - --disable-custom-all-reduce
            - --enforce-eager
            - -O0
            - --max-num-seqs
            - "$(VLLM_MAX_NUM_SEQS)"
          ports:
            - name: http
              containerPort: 5000
          envFrom:
            - configMapRef:
                name: a-cong-ocr-config
          env:
            - name: HF_HOME
              value: /root/.cache/huggingface
          volumeMounts:
            - name: models
              mountPath: /models
              readOnly: true
            - name: model-cache
              mountPath: /root/.cache/huggingface
            - name: runtime-data
              mountPath: /data/runtime
              readOnly: true
            - name: dshm
              mountPath: /dev/shm
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 80
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 8
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 8
          resources:
            requests:
              cpu: "8"
              memory: 64Gi
              nvidia.com/gpu: "1"
              nvidia.com/gpumem-percentage: "30"
              nvidia.com/gpucores: "30"
            limits:
              cpu: "24"
              memory: 160Gi
              nvidia.com/gpu: "1"
              nvidia.com/gpumem-percentage: "30"
              nvidia.com/gpucores: "30"
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: a-cong-ocr-models-pvc
        - name: model-cache
          persistentVolumeClaim:
            claimName: a-cong-ocr-model-cache-pvc
        - name: runtime-data
          persistentVolumeClaim:
            claimName: a-cong-ocr-runtime-pvc
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 16Gi
---
apiVersion: v1
kind: Service
metadata:
  name: a-cong-vllm-ocr
  namespace: nocodeaidev
  labels:
    app.kubernetes.io/name: a-cong-ocr
    app.kubernetes.io/component: vllm-ocr
spec:
  type: ClusterIP
  selector:
